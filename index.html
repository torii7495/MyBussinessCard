<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Victoria Huddleston — Tech Home Help</title>
<link href="https://fonts.googleapis.com/css2?family=Eczar:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    padding: 2rem 1rem;
  }
  .card {
    width: 420px;
    background: #000;
    border: 1px solid #0017FF;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0, 23, 255, 0.25), 0 0 80px rgba(0, 23, 255, 0.08);
  }
  .card-top {
    background: #0017FF;
    padding: 2rem 2rem 1.5rem;
    position: relative;
  }
  .card-top::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0; right: 0;
    height: 24px;
    background: #000;
    border-radius: 20px 20px 0 0;
  }
  .photo-area {
    width: 96px;
    height: 96px;
    border-radius: 14px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .photo-area img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
    border-radius: 14px;
  }
  .header-row {
    display: flex;
    align-items: flex-start;
    gap: 1.25rem;
  }
  .name-block {
    flex: 1;
    padding-top: 4px;
  }
  .name {
    font-family: 'Eczar', serif;
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    line-height: 1.1;
    letter-spacing: -0.01em;
  }
  .title {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 6px;
  }
  .card-body {
    padding: 1.75rem 2rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }
  .divider {
    height: 1px;
    background: rgba(0, 23, 255, 0.3);
  }
  .contact-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .contact-item {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .contact-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: rgba(0, 23, 255, 0.12);
    border: 1px solid rgba(0, 23, 255, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .contact-icon svg { width: 16px; height: 16px; }
  .contact-label {
    font-size: 10px;
    font-weight: 500;
    color: #0017FF;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1px;
  }
  .contact-value {
    font-size: 14px;
    font-weight: 400;
    color: #fff;
    letter-spacing: 0.01em;
  }
  .contact-value a { color: #fff; text-decoration: none; }
  .qr-row {
    display: flex;
    align-items: center;
    gap: 1.25rem;
  }
  .qr-wrapper {
    background: #fff;
    border-radius: 10px;
    padding: 8px;
    flex-shrink: 0;
    line-height: 0;
  }
  #qrcode canvas, #qrcode img { border-radius: 4px; display: block; }
  .qr-text { flex: 1; }
  .qr-label {
    font-size: 11px;
    font-weight: 500;
    color: #0017FF;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .qr-desc {
    font-size: 12px;
    font-weight: 300;
    color: rgba(255,255,255,0.55);
    line-height: 1.5;
  }
  .footer-line {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-top: 4px;
  }
  .footer-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #0017FF;
  }
  .footer-text {
    font-size: 10px;
    font-weight: 400;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
</head>
